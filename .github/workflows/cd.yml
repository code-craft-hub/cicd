name: CD

# Runs after CI has validated main. Builds one image, deploys it to staging,
# then pauses on the production job until a required reviewer approves the
# "production" GitHub Environment (configured in repo Settings, see README).
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "tag=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tag }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - run: echo "Deploying ${{ needs.build-and-push.outputs.image }} to STAGING"
      # Replace with real deploy commands (kubectl, ssh, terraform, etc.)

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://example.com
    steps:
      - run: echo "Deploying ${{ needs.build-and-push.outputs.image }} to PRODUCTION"
      # Replace with real deploy commands (kubectl, ssh, terraform, etc.)
