name: CD

# Triggered by CI finishing on main, not by push directly - deploying must
# never race the test suite that's supposed to gate it. Builds one image,
# provisions a fresh staging VM with Pulumi, then pauses on the production
# job until a required reviewer approves the "production" GitHub Environment
# (configured in repo Settings, see README). Staging is torn down once
# production succeeds.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: us-central1
  ARTIFACT_REPO: fastify-repo
  IMAGE_NAME: fastify-hello-world

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    outputs:
      image: ${{ steps.image.outputs.tag }}
      sha: ${{ steps.image.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - id: image
        run: |
          SHA="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-12)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${GCP_REGION}-docker.pkg.dev/cverai/${ARTIFACT_REPO}/${IMAGE_NAME}:${SHA}" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tag }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
    outputs:
      ip: ${{ steps.up.outputs.ip }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: pulumi/setup-pulumi@v2

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - working-directory: infra/compute
        run: npm ci

      - id: up
        working-directory: infra/compute
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select staging --create
          pulumi config set fastify-compute:imageTag "${{ needs.build-and-push.outputs.sha }}"
          pulumi up --yes
          echo "ip=$(pulumi stack output publicIp)" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        run: |
          sleep 30
          curl -sf "http://${{ steps.up.outputs.ip }}:3000/health"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: pulumi/setup-pulumi@v2
      - uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - working-directory: infra/compute
        run: npm ci

      - working-directory: infra/compute
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select production --create
          pulumi config set fastify-compute:imageTag "${{ needs.build-and-push.outputs.sha }}"
          pulumi up --yes

      # A metadata-only update doesn't re-run the COS startup script on a
      # live instance, so force a reboot to pick up the new image.
      - name: Restart instance to pull new image
        run: gcloud compute instances reset fastify-production --zone=us-central1-a

  destroy-staging:
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: pulumi/setup-pulumi@v2

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - working-directory: infra/compute
        run: npm ci

      - working-directory: infra/compute
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select staging
          pulumi destroy --yes
